<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — TeleLink</title>
  <link rel="stylesheet" href="static/style.css"/>
  <style>
    .auth-box { max-width: 400px; margin: 4rem auto; padding: 2.5rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); backdrop-filter: blur(20px); }
  </style>
</head>
<body>
  <div class="bg-orbs"></div>
  <div id="toast-container"></div>
  
  <nav class="navbar">
    <a class="nav-logo" href="/">
      <div class="logo-icon">🔗</div> TeleLink
    </a>
  </nav>

  <div class="container">
    <div class="auth-box">
      <h2 class="mb-2" style="font-size: 1.5rem; font-weight: 800; text-align: center;">Welcome Back</h2>
      <p class="text-muted text-center mb-2">Access your content unlocking dashboard.</p>
      
      <form id="login-form">
        <div class="input-group">
          <label class="input-label">Email Address</label>
          <input type="email" id="email" class="input" placeholder="name@example.com" required/>
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="login-btn">Sign In →</button>
      </form>
      
      <div style="margin-top:1.5rem; text-align:center; font-size: 0.9rem">
        <span class="text-dim">Don't have an account?</span>
        <a href="/signup" style="color:var(--accent-light); font-weight:700">Create Account</a>
      </div>
    </div>
  </div>

  <script src="/static/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="static/app.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      
      btn.disabled = true;
      btn.textContent = 'Authenticating...';
      
      try {
        await logIn(email, pw);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/tool'; }, 1000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });

    // Check if already logged in
    (async () => {
      const session = await getSession();
      if (session) window.location.href = '/tool';
    })();
  </script>
</body>
</html>
