<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — TeleLink</title>
  <link rel="stylesheet" href="static/style.css"/>
  <style>
    .admin-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-top: 2rem; }
    .order-row { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .auth-card { max-width: 400px; width: 90%; padding: 2.5rem; background: var(--bg2); border: 1px solid var(--border-strong); border-radius: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="bg-orbs"></div>
  <div id="toast-container"></div>

  <!-- Admin Password Overlay -->
  <div id="admin-auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="logo-icon" style="margin: 0 auto 1.5rem">🔑</div>
      <h2 class="mb-2">Admin Access</h2>
      <p class="text-muted mb-2">Please enter the master password to manage requests.</p>
      <div class="input-group">
        <input type="password" id="admin-password-input" class="input" placeholder="••••••••" autofocus/>
      </div>
      <button onclick="tryAdminLogin()" class="btn btn-primary w-full mt-2">Unlock Dashboard →</button>
    </div>
  </div>

  <nav class="navbar">
    <a class="nav-logo" href="/">
      <div class="logo-icon">🔗</div> TeleLink Admin
    </a>
    <div style="display:flex; align-items:center; gap:20px">
      <button onclick="lockAdmin()" class="btn btn-ghost">Lock Panel</button>
    </div>
  </nav>

  <div class="container mt-2">
    <div style="display:flex; justify-content:space-between; align-items:center" class="mb-2">
      <h2>Global Request Queue</h2>
      <button onclick="loadAdminDashboard()" class="btn btn-outline">🔄 Refresh</button>
    </div>

    <div id="admin-queue" class="admin-grid">
      <div class="text-center">Loading requests...</div>
    </div>
  </div>

  <script src="/static/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="static/app.js"></script>
  <script>
    let currentAdminSecret = localStorage.getItem('admin_secret');
    const queueEl = document.getElementById('admin-queue');
    const authOverlay = document.getElementById('admin-auth-overlay');

    if (currentAdminSecret) {
      authOverlay.style.display = 'none';
      loadAdminDashboard();
    }

    async function tryAdminLogin() {
      const password = document.getElementById('admin-password-input').value;
      if (!password) { showToast('Enter password', 'error'); return; }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.ok) {
          currentAdminSecret = password;
          localStorage.setItem('admin_secret', password);
          authOverlay.style.display = 'none';
          showToast('Dashboard Unlocked', 'success');
          loadAdminDashboard();
        } else {
          showToast('Invalid password', 'error');
        }
      } catch (e) {
        showToast('Login failed', 'error');
      }
    }

    async function loadAdminDashboard() {
      if (!currentAdminSecret) return;

      try {
        const res = await fetch('/api/admin/requests', {
          headers: { 'x-admin-secret': currentAdminSecret }
        });
        const data = await res.json();
        
        if (res.status === 403) {
          lockAdmin();
          showToast('Session expired or invalid password', 'error');
          return;
        }

        if (data.ok) {
          queueEl.innerHTML = data.orders.map(o => `
            <div class="order-row">
              <div style="display:flex; justify-content:space-between; align-items:flex-start">
                <div>
                  <span class="admin-order-id">#${o.id}</span>
                  <p style="font-weight:700; color:var(--text); margin:5px 0">${o.user_email}</p>
                </div>
                ${getStatusBadge(o.status)}
              </div>
              
              <div style="background:var(--bg); padding:1rem; border-radius:8px">
                <p style="font-size:0.85rem; color:var(--text-muted)">Invite: <a href="${o.channel_link}" target="_blank" style="color:var(--accent-light)">${o.channel_link}</a></p>
                <p style="font-size:0.85rem; color:var(--text-muted)">Target: <a href="${o.content_link}" target="_blank" style="color:var(--accent-light)">${o.content_link}</a></p>
              </div>

              <div class="order-status-actions">
                <button class="btn btn-primary" onclick="showCompletionForm(${o.id})">✅ Complete Order</button>
                <button class="btn btn-outline" onclick="updateStatus(${o.id}, 'Processing')">🔄 Mark Processing</button>
              </div>

              <div id="form-${o.id}" class="completion-form" style="display:none">
                <div class="input-group">
                  <label class="input-label">Result Link / Content</label>
                  <input type="text" id="res-${o.id}" class="input" placeholder="Paste result URL..." value="${o.result_content || ''}"/>
                </div>
                <div style="display:flex; gap:10px">
                  <button class="btn btn-primary" onclick="submitCompletion(${o.id})">Save Result</button>
                  <button class="btn btn-ghost" onclick="hideCompletionForm(${o.id})">Cancel</button>
                </div>
              </div>

              <small class="text-dim">Submitted: ${fmtDate(o.created_at)}</small>
            </div>
          `).join('') || '<div class="admin-card text-center">No orders found.</div>';
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function showCompletionForm(id) { document.getElementById(`form-${id}`).style.display = 'block'; }
    function hideCompletionForm(id) { document.getElementById(`form-${id}`).style.display = 'none'; }

    async function updateStatus(id, newStatus) {
      try {
        const res = await fetch('/api/admin/complete', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'x-admin-secret': currentAdminSecret 
          },
          body: JSON.stringify({ request_id: id, status: newStatus, result_content: '' })
        });
        const data = await res.json();
        if (data.ok) { showToast('Status updated', 'success'); loadAdminDashboard(); }
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function submitCompletion(id) {
      const result = document.getElementById(`res-${id}`).value;
      try {
        const res = await fetch('/api/admin/complete', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'x-admin-secret': currentAdminSecret 
          },
          body: JSON.stringify({ request_id: id, status: 'Completed', result_content: result })
        });
        const data = await res.json();
        if (data.ok) { showToast('Order completed!', 'success'); loadAdminDashboard(); }
      } catch (e) { showToast(e.message, 'error'); }
    }

    function lockAdmin() {
      localStorage.removeItem('admin_secret');
      currentAdminSecret = null;
      authOverlay.style.display = 'flex';
      queueEl.innerHTML = '';
      document.getElementById('admin-password-input').value = '';
    }
  </script>
</body>
</html>
