<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TeleLink</title>
  <link rel="stylesheet" href="static/style.css"/>
  <style>
    .auth-box { max-width: 400px; margin: 4rem auto; padding: 2.5rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); backdrop-filter: blur(20px); }
  </style>
</head>
<body>
  <div class="bg-orbs"></div>
  <div id="toast-container"></div>
  
  <nav class="navbar">
    <a class="nav-logo" href="index.html">
      <div class="logo-icon">🔗</div> TeleLink
    </a>
  </nav>

  <div class="container">
    <div class="auth-box">
      <h2 class="mb-2" style="font-size: 1.5rem; font-weight: 800; text-align: center;">Join TeleLink</h2>
      <p class="text-muted text-center mb-2">Create an account to start submitting requests.</p>
      
      <form id="signup-form">
        <div class="input-group">
          <label class="input-label">Email Address</label>
          <input type="email" id="email" class="input" placeholder="name@example.com" required/>
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required minlength="6"/>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="signup-btn">Create Account →</button>
      </form>
      
      <div style="margin-top:1.5rem; text-align:center; font-size: 0.9rem">
        <span class="text-dim">Already have an account?</span>
        <a href="login.html" style="color:var(--accent-light); font-weight:700">Log In</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="static/app.js"></script>
  <script>
    const form = document.getElementById('signup-form');
    const btn = document.getElementById('signup-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      
      btn.disabled = true;
      btn.textContent = 'Please wait...';
      
      try {
        await signUp(email, pw);
        showToast('Check your email for the verification link!', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    });
  </script>
</body>
</html>
