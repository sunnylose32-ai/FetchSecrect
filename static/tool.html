<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tool — TeleLink</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    body {
      display: flex; flex-direction: column; min-height: 100vh;
    }

    /* ── Tool navbar ──────────────────────────────────────────────────── */
    .tool-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 64px;
      background: rgba(5,8,16,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tool-nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 1.1rem;
      text-decoration: none; color: var(--text);
    }
    .tool-nav-logo .logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .user-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 14px 6px 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 100px;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff; font-weight: 700; flex-shrink: 0;
    }
    .user-name { font-size: 0.85rem; font-weight: 600; }
    .user-phone { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Main layout ──────────────────────────────────────────────────── */
    .tool-main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 3rem 1.5rem 4rem;
      position: relative; z-index: 1;
    }

    /* ── Fetch panel ──────────────────────────────────────────────────── */
    .fetch-panel {
      width: 100%; max-width: 700px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem;
      backdrop-filter: blur(12px);
      margin-bottom: 2rem; position: relative; overflow: hidden;
    }
    .fetch-panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .fetch-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem;
    }
    .fetch-sub { font-size: 0.83rem; color: var(--text-muted); margin-bottom: 1.25rem; }

    .fetch-row {
      display: flex; gap: 10px;
    }
    #link-input {
      flex: 1; padding: 0.9rem 1.1rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: monospace;
      font-size: 0.9rem; outline: none; transition: all var(--transition);
    }
    #link-input::placeholder { color: var(--text-dim); font-family: 'Inter', sans-serif; }
    #link-input:focus {
      border-color: var(--accent); background: rgba(124,58,237,0.06);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }
    #fetch-btn {
      padding: 0 1.5rem; border-radius: 12px; flex-shrink: 0;
    }

    /* ── Result card ──────────────────────────────────────────────────── */
    #result-area { width: 100%; max-width: 700px; }

    .result-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 1.75rem;
      backdrop-filter: blur(12px); animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.25rem;
    }
    .result-meta { flex: 1; }
    .result-meta-top {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .result-type-badge {
      padding: 3px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 700;
    }
    .type-text { background: var(--blue-dim); color: #93c5fd; }
    .type-media { background: var(--accent-dim); color: var(--accent-light); }
    .result-msgid { font-size: 0.78rem; color: var(--text-dim); font-family: monospace; }
    .result-date { font-size: 0.78rem; color: var(--text-dim); }
    .result-from { font-size: 0.82rem; color: var(--text-muted); }

    .result-copy-btn {
      padding: 7px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.78rem; font-family: inherit;
      cursor: pointer; transition: all var(--transition); flex-shrink: 0;
    }
    .result-copy-btn:hover { background: var(--card-hover); color: var(--text); }

    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    /* Text result */
    .text-content {
      font-size: 0.95rem; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
    }

    /* Media result */
    .media-card {
      display: flex; align-items: center; gap: 1rem;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.1rem 1.2rem;
    }
    .media-icon-wrap {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
      background: var(--accent-dim);
    }
    .media-info { flex: 1; min-width: 0; }
    .media-name {
      font-weight: 600; font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .media-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
    .media-caption {
      font-size: 0.88rem; color: var(--text-muted); margin-top: 0.8rem;
      line-height: 1.6; white-space: pre-wrap;
    }
    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 10px; font-size: 0.88rem;
      font-weight: 600; text-decoration: none; margin-top: 1rem;
    }

    /* Error display */
    .error-card {
      border-radius: 14px; padding: 1.2rem;
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.2);
      color: var(--error); font-size: 0.9rem;
    }
    .error-card strong { display: block; margin-bottom: 4px; font-size: 1rem; }

    /* Loading state */
    .loading-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.5rem; border-radius: 14px;
      background: var(--card); border: 1px solid var(--border);
    }
    .loading-card span { color: var(--text-muted); font-size: 0.9rem; }

    /* ── History ──────────────────────────────────────────────────────── */
    .history-section { width: 100%; max-width: 700px; margin-top: 2.5rem; }
    .history-title {
      font-size: 0.82rem; font-weight: 700; color: var(--text-dim);
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    #clear-history {
      background: none; border: none; color: var(--text-dim);
      font-size: 0.78rem; cursor: pointer; font-family: inherit;
      transition: color var(--transition);
    }
    #clear-history:hover { color: var(--error); }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      background: var(--card); border: 1px solid var(--border);
      margin-bottom: 6px; cursor: pointer;
      transition: all var(--transition);
    }
    .history-item:hover {
      background: var(--card-hover); border-color: var(--border-strong);
    }
    .history-icon { font-size: 16px; flex-shrink: 0; }
    .history-link {
      flex: 1; font-size: 0.82rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: monospace;
    }
    .history-time { font-size: 0.75rem; color: var(--text-dim); flex-shrink: 0; }

    @media (max-width: 640px) {
      .tool-main { padding: 1.5rem 1rem 3rem; }
      .fetch-row { flex-direction: column; }
      .tool-nav { padding: 0 1rem; }
      .user-phone { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs"></div>
  <div id="toast-container"></div>

  <!-- Tool Navbar -->
  <nav class="tool-nav">
    <a class="tool-nav-logo" href="/">
      <div class="logo-icon">🔗</div>
      TeleLink
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <div class="user-pill" id="user-pill" style="display:none">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-phone" id="user-phone">—</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-danger" onclick="logout()" style="font-size:0.85rem;padding:7px 14px">
        Logout
      </button>
    </div>
  </nav>

  <main class="tool-main">

    <!-- Fetch Input Panel -->
    <div class="fetch-panel">
      <div class="fetch-title">🔗 Fetch a Telegram Message</div>
      <div class="fetch-sub">Paste a private channel post link below. Only channels you've joined are accessible.</div>
      <div class="fetch-row">
        <input
          type="text" id="link-input"
          placeholder="https://t.me/c/1234567890/123"
          autocomplete="off" spellcheck="false"
        />
        <button class="btn btn-primary" id="fetch-btn">Fetch →</button>
      </div>
      <div style="margin-top:0.6rem;font-size:0.78rem;color:var(--text-dim)">
        Supports: <code style="color:var(--accent-light)">t.me/c/</code> private channel links &nbsp;·&nbsp;
        <code style="color:var(--accent-light)">t.me/username/</code> public channel links
      </div>
    </div>

    <!-- Result Area -->
    <div id="result-area"></div>

    <!-- History -->
    <div class="history-section" id="history-section" style="display:none">
      <div class="history-title">
        Recent Fetches
        <button id="clear-history">Clear</button>
      </div>
      <div id="history-list"></div>
    </div>

  </main>

  <script src="/static/app.js"></script>
  <script>
    const HISTORY_KEY = 'tl_history';

    // ── Auth check ────────────────────────────────────────────────────────
    (async () => {
      const user = await requireAuth();
      if (!user) return;
      // Populate navbar
      const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('user-avatar').textContent = initials;
      document.getElementById('user-name').textContent   = user.name || 'User';
      document.getElementById('user-phone').textContent  = user.phone || '';
      document.getElementById('user-pill').style.display = 'flex';
      loadHistory();
    })();

    // ── Fetch logic ───────────────────────────────────────────────────────
    const linkInput = document.getElementById('link-input');
    const fetchBtn  = document.getElementById('fetch-btn');
    const resultArea = document.getElementById('result-area');

    async function doFetch() {
      const link = linkInput.value.trim();
      if (!link) { showToast('Paste a Telegram link first', 'error'); return; }

      // Loading
      resultArea.innerHTML = `
        <div class="loading-card">
          <div class="spinner"></div>
          <span>Fetching message from Telegram…</span>
        </div>`;
      fetchBtn.disabled = true;
      fetchBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>';

      try {
        const token = getSessionToken();
        const data = await apiCall('POST', '/api/fetch', { link }, token);
        renderResult(data, link);
        saveHistory(link, data.type, data.media_type);
      } catch (e) {
        resultArea.innerHTML = `
          <div class="error-card">
            <strong>❌ Error</strong>
            ${escHtml(e.message)}
            <div style="margin-top:8px;font-size:0.82rem;opacity:0.7">
              Make sure you have joined the channel and the link is correct.
            </div>
          </div>`;
        showToast('Fetch failed', 'error');
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.innerHTML = 'Fetch →';
      }
    }

    fetchBtn.addEventListener('click', doFetch);
    linkInput.addEventListener('keydown', e => { if (e.key === 'Enter') doFetch(); });

    // ── Render result ─────────────────────────────────────────────────────
    function renderResult(data, link) {
      const typeBadge = data.type === 'text'
        ? '<span class="result-type-badge type-text">📝 Text</span>'
        : `<span class="result-type-badge type-media">${mediaIcon(data.media_type)} ${capitalize(data.media_type)}</span>`;

      const fromHtml = data.from_user
        ? `<div class="result-from">From: <strong>${escHtml(data.from_user)}</strong></div>` : '';

      let bodyHtml = '';
      if (data.type === 'text') {
        bodyHtml = `<div class="text-content">${escHtml(data.content)}</div>`;
      } else {
        const fname = data.file_name || `${data.media_type || 'file'}`;
        const fsize = data.file_size_human || '';
        const caption = data.caption ? `<div class="media-caption">${escHtml(data.caption)}</div>` : '';
        const dlBtn = data.download_url
          ? `<a class="btn btn-primary download-btn" href="${data.download_url}" download>
               📥 Download ${fsize ? '· ' + fsize : ''}
             </a>`
          : '';
        bodyHtml = `
          <div class="media-card">
            <div class="media-icon-wrap">${mediaIcon(data.media_type)}</div>
            <div class="media-info">
              <div class="media-name">${escHtml(fname)}</div>
              <div class="media-meta">${capitalize(data.media_type || 'File')} ${fsize ? '· ' + fsize : ''}</div>
            </div>
          </div>
          ${caption}
          ${dlBtn}`;
      }

      resultArea.innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-meta">
              <div class="result-meta-top">
                ${typeBadge}
                <span class="result-msgid">msg #${data.message_id}</span>
              </div>
              <div class="result-date">${fmtDate(data.date)}</div>
              ${fromHtml}
            </div>
            ${data.type === 'text'
              ? `<button class="result-copy-btn" onclick="copyText(${JSON.stringify(data.content)})">📋 Copy</button>`
              : ''}
          </div>
          <div class="divider"></div>
          ${bodyHtml}
          <div style="margin-top:1.2rem;display:flex;align-items:center;gap:8px">
            <span style="font-size:0.78rem;color:var(--text-dim)">Source:</span>
            <a href="${escHtml(link)}" target="_blank" rel="noopener"
               style="font-size:0.78rem;color:var(--accent-light);font-family:monospace;word-break:break-all">
              ${escHtml(link)}
            </a>
          </div>
        </div>`;
    }

    // ── History ───────────────────────────────────────────────────────────
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
    }
    function saveHistory(link, type, mediaType) {
      let hist = getHistory();
      hist = hist.filter(h => h.link !== link); // dedupe
      hist.unshift({ link, type, mediaType, ts: Date.now() });
      hist = hist.slice(0, 10); // keep last 10
      localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
      loadHistory();
    }
    function loadHistory() {
      const hist = getHistory();
      const section = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      if (!hist.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = hist.map(h => {
        const icon = h.type === 'text' ? '📝' : mediaIcon(h.mediaType);
        const ago  = timeAgo(h.ts);
        return `<div class="history-item" onclick="loadFromHistory('${escHtml(h.link)}')">
          <span class="history-icon">${icon}</span>
          <span class="history-link">${escHtml(h.link)}</span>
          <span class="history-time">${ago}</span>
        </div>`;
      }).join('');
    }
    function loadFromHistory(link) {
      linkInput.value = link;
      linkInput.focus();
      doFetch();
    }
    document.getElementById('clear-history').addEventListener('click', () => {
      localStorage.removeItem(HISTORY_KEY);
      loadHistory();
      showToast('History cleared', 'info', 2000);
    });

    // ── Helpers ───────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
    function timeAgo(ts) {
      const d = Math.floor((Date.now() - ts) / 60000);
      if (d < 1)  return 'Just now';
      if (d < 60) return `${d}m ago`;
      if (d < 1440) return `${Math.floor(d/60)}h ago`;
      return `${Math.floor(d/1440)}d ago`;
    }
  </script>
</body>
</html>
